<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick & Morty</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="loading">loading...</div>
    <!-- HEADER -->
    <header>
        <h1>Rick & Morty</h1>
        <!-- FILTERS -->
        <section>
            <button class="filter-btn active" data-gender="all">All</button>
            <button class="filter-btn" data-gender="Male">Male</button>
            <button class="filter-btn" data-gender="Female">Female</button>
            <button class="filter-btn" data-gender="unknown">Unknown</button>
        </section>
        <!-- PAGE INFO -->
        <p id="page-info"></p>
    </header>


    <!-- CHARACTER LIST -->
    <ul id="character"></ul>

    <!-- PAGINATION -->
    <div class="pagination">
        <button id="btnPrev" disabled>Previous</button>
        <button id="btnNext" disabled>Next</button>
    </div>

    <!-- AXIOS -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- SCRIPT -->
    <script src="assets/js/script.js"></script>

</body>

</html>
